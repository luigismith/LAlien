<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" shape-rendering="crispEdges">
  <!-- Pure pixel-art app icon. 24x24 grid, 8px per cell. -->
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="192" height="192" rx="38" ry="38"/></clipPath>
  </defs>

  <!-- Deep-space background -->
  <rect x="0" y="0" width="192" height="192" rx="38" ry="38" fill="#0C0820"/>

  <g clip-path="url(#round)">
    <!-- Nebula bands (flat, no gradients — pixel-art purity) -->
    <rect x="0"  y="32" width="192" height="8" fill="#12083A"/>
    <rect x="0"  y="96" width="192" height="8" fill="#100830"/>

    <!-- Stars: dim -->
    <g fill="#A0B8FF">
      <rect x="32"  y="8"  width="8" height="8"/>
      <rect x="168" y="24" width="8" height="8"/>
      <rect x="168" y="80" width="8" height="8"/>
    </g>
    <!-- Stars: cool white -->
    <g fill="#EAFBFB">
      <rect x="160" y="16" width="8" height="8"/>
      <rect x="16"  y="40" width="8" height="8"/>
      <rect x="16"  y="80" width="8" height="8"/>
    </g>
    <!-- Stars: warm (yellow) -->
    <g fill="#FFE899">
      <rect x="136" y="8"  width="8" height="8"/>
      <rect x="16"  y="24" width="8" height="8"/>
    </g>
    <!-- Stars: pale cyan (distant) -->
    <g fill="#C8DCFF">
      <rect x="168" y="48" width="8" height="8"/>
    </g>

    <!-- Antenna tip (bright core) -->
    <g fill="#EAFFFF">
      <rect x="72"  y="0" width="8" height="8"/>
      <rect x="112" y="0" width="8" height="8"/>
    </g>
    <!-- Antenna glow -->
    <g fill="#80F0F0">
      <rect x="72"  y="8" width="8" height="8"/>
      <rect x="112" y="8" width="8" height="8"/>
    </g>
    <!-- Antenna stems -->
    <g fill="#3ECFCF">
      <rect x="72"  y="16" width="8" height="16"/>
      <rect x="112" y="16" width="8" height="16"/>
    </g>

    <!-- Body: highlight pixels (*) along left edge -->
    <g fill="#F0C8F0">
      <rect x="64" y="32"  width="8" height="8"/>   <!-- r4 c8 -->
      <rect x="56" y="40"  width="8" height="8"/>   <!-- r5 c7 -->
      <rect x="48" y="48"  width="8" height="8"/>   <!-- r6 c6 -->
      <rect x="40" y="56"  width="8" height="56"/>  <!-- r7-13 c5 (vertical run) -->
      <rect x="48" y="112" width="8" height="8"/>   <!-- r14 c6 -->
      <rect x="56" y="120" width="8" height="8"/>   <!-- r15 c7 -->
      <rect x="64" y="128" width="8" height="8"/>   <!-- r16 c8 -->
      <rect x="80" y="136" width="8" height="8"/>   <!-- r17 c10 -->
    </g>

    <!-- Body: dark pixels (@) along right edge -->
    <g fill="#9F60A0">
      <rect x="120" y="32"  width="8" height="8"/>   <!-- r4 c15 -->
      <rect x="128" y="40"  width="8" height="8"/>   <!-- r5 c16 -->
      <rect x="136" y="48"  width="8" height="8"/>   <!-- r6 c17 -->
      <rect x="144" y="56"  width="8" height="56"/>  <!-- r7-13 c18 -->
      <rect x="136" y="112" width="8" height="8"/>   <!-- r14 c17 -->
      <rect x="128" y="120" width="8" height="8"/>   <!-- r15 c16 -->
      <rect x="120" y="128" width="8" height="8"/>   <!-- r16 c15 -->
      <rect x="104" y="136" width="8" height="8"/>   <!-- r17 c13 -->
    </g>

    <!-- Body: mid fill (#D8A0D8) — sliced per row so eyes/mouth carve out -->
    <g fill="#D8A0D8">
      <!-- r4 cols 9-14 -->
      <rect x="72"  y="32"  width="48" height="8"/>
      <!-- r5 cols 8-15 -->
      <rect x="64"  y="40"  width="64" height="8"/>
      <!-- r6 cols 7-16 -->
      <rect x="56"  y="48"  width="80" height="8"/>
      <!-- r7 cols 6-17 -->
      <rect x="48"  y="56"  width="96" height="8"/>
      <!-- r8 cols 6-17 -->
      <rect x="48"  y="64"  width="96" height="8"/>
      <!-- r9: c6 + c10-13 + c17 (eyes at 7-9 and 14-16) -->
      <rect x="48"  y="72"  width="8"  height="8"/>
      <rect x="80"  y="72"  width="32" height="8"/>
      <rect x="136" y="72"  width="8"  height="8"/>
      <!-- r10: c6 + c10-13 + c17 -->
      <rect x="48"  y="80"  width="8"  height="8"/>
      <rect x="80"  y="80"  width="32" height="8"/>
      <rect x="136" y="80"  width="8"  height="8"/>
      <!-- r11 cols 6-17 -->
      <rect x="48"  y="88"  width="96" height="8"/>
      <!-- r12: c7-9 + c14-16 (cheeks at 6,17; mouth at 10-13) -->
      <rect x="56"  y="96"  width="24" height="8"/>
      <rect x="112" y="96"  width="24" height="8"/>
      <!-- r13 cols 6-17 -->
      <rect x="48"  y="104" width="96" height="8"/>
      <!-- r14 cols 7-16 -->
      <rect x="56"  y="112" width="80" height="8"/>
      <!-- r15 cols 8-15 -->
      <rect x="64"  y="120" width="64" height="8"/>
      <!-- r16 cols 9-14 -->
      <rect x="72"  y="128" width="48" height="8"/>
      <!-- r17 cols 11-12 -->
      <rect x="88"  y="136" width="16" height="8"/>
    </g>

    <!-- Eye whites -->
    <g fill="#EAFBFB">
      <!-- r9 left (cols 7-9) and right (cols 14-16) — 3 wide -->
      <rect x="56"  y="72" width="24" height="8"/>
      <rect x="112" y="72" width="24" height="8"/>
      <!-- r10 corners around pupil (whites at c7, c9, c14, c16) -->
      <rect x="56"  y="80" width="8" height="8"/>
      <rect x="72"  y="80" width="8" height="8"/>
      <rect x="112" y="80" width="8" height="8"/>
      <rect x="128" y="80" width="8" height="8"/>
    </g>

    <!-- Pupils -->
    <g fill="#120820">
      <rect x="64"  y="80" width="8" height="8"/>   <!-- r10 c8 -->
      <rect x="120" y="80" width="8" height="8"/>   <!-- r10 c15 -->
    </g>

    <!-- Cheeks -->
    <g fill="#E88098">
      <rect x="48"  y="96" width="8" height="8"/>   <!-- r12 c6 -->
      <rect x="136" y="96" width="8" height="8"/>   <!-- r12 c17 -->
    </g>

    <!-- Mouth -->
    <g fill="#6A2050">
      <rect x="80" y="96" width="32" height="8"/>   <!-- r12 cols 10-13 -->
    </g>

    <!-- Ground shadow under pet (row 18 cols 7-16) -->
    <g fill="#140828">
      <rect x="56" y="144" width="80" height="8"/>
    </g>

    <!-- Ground crystal sparkles (row 19) — flanking the pet silhouette -->
    <g fill="#80F0F0"><rect x="16"  y="152" width="8" height="8"/></g>
    <g fill="#3ECFCF"><rect x="24"  y="152" width="8" height="8"/></g>
    <g fill="#FFE899"><rect x="160" y="152" width="8" height="8"/></g>
    <g fill="#D8B0FF"><rect x="168" y="152" width="8" height="8"/></g>

    <!-- Ground surface: lighter top edge + deep base -->
    <rect x="0" y="160" width="192" height="8"  fill="#4A2A6A"/>
    <rect x="0" y="168" width="192" height="24" fill="#2A1A4A"/>

    <!-- Ground texture: scattered dark flecks -->
    <g fill="#1A0A30">
      <rect x="24"  y="176" width="8" height="8"/>
      <rect x="72"  y="184" width="8" height="8"/>
      <rect x="120" y="176" width="8" height="8"/>
      <rect x="160" y="184" width="8" height="8"/>
    </g>
  </g>
</svg>
